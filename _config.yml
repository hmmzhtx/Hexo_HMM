# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: 个人在互联网中的琐碎
subtitle: 记录技术、思考与日常
description: '简单、随性'
keywords:
  - 博客
  - Hexo
  - Butterfly
author: hmm
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://hexo-60k.pages.dev
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: prismjs
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 默认分类
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
# Cloudflare Pages 使用 Git 集成构建，无需 hexo deploy
# 如需扩展可另行安装部署插件
deploy:
  type: ''
